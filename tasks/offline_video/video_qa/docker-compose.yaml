services:
  task-env:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcpu-mm-video-qa:${MCPU_MM_TASK_NAME:-video_qa}
    container_name: mcpu-mm-video-qa-${MCPU_MM_TASK_NAME:-video_qa}
    working_dir: /workspace
    volumes:
      - ../../../../MCP-Universe:/mcp-universe:ro
      - ../../..:/mcpu-mm:ro
      - ./inputs:/inputs:ro
      # Host-visible /workspace so LLM can resolve file:// paths for get_frame outputs + media_tools
      - ./shared_workspace:/workspace
    environment:
      - PYTHONPATH=/mcp-universe:/mcpu-mm:/workspace
      - FILESYSTEM_DIRECTORY=/workspace
      - VIDEO_EDITING_OUTPUT_DIR=/workspace
      - FASTMCP_HOST=0.0.0.0
    command:
      - sh
      - -c
      - |
        rm -rf /workspace/*
        cp -r /inputs/. /workspace/

        python3 -m mcpuniverse.mcp.gateway \
          --port 3333 \
          --config /mcp-universe/mcpuniverse/mcp/configs/server_list.json \
          --mode stdio \
          --servers filesystem &

        python3 -m mcpuniverse.mcp.servers.video_editing --transport sse --port 4455 &
        python3 -m mcpuniverse.mcp.servers.media_tools --transport sse --port 4444 &
        sleep infinity
    ports:
      - "${FILESYSTEM_MCP_PORT:-3333}:3333"
      - "${VIDEO_EDITING_MCP_PORT:-4455}:4455"
      - "${MEDIA_TOOLS_MCP_PORT:-4444}:4444"
