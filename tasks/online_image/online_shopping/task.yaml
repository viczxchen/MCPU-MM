# MCPU-MM Task Configuration

name: online_shopping
category: online_image_qa

question: |
  You are given a product image.
  Find the most likely product listing online and report the requested shopping fact.

  Requirements:
  - Use media_tools to identify product details from the image.
  - Use Playwright and google-search to locate matching listings.
  - Public image URL (for tools that require image_url): https://cdn.jsdelivr.net/gh/viczxchen/MCPU-MM@f20b19952a24f80150b8a9aea3fd06c508c3285a/tasks/online_image/online_shopping/inputs/MMsearch_sample.png
  - Return ONLY the vehicle model/version string (no explanation, no extra text).
  - Example output style: "Land Rover Freelander LR2 HSE"

output_format:
  type: string

mcp_servers:
  - name: playwright
  - name: google-search
  - name: media_tools

inputs:
  images:
    - inputs/MMsearch_sample.png
  videos: []
  pdfs: []
